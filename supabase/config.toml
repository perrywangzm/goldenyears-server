# Local-only Supabase project. Application schema migrations remain in src/db/migrations.
project_id = "golden-years-server-next-local"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17
health_timeout = "2m"

[db.migrations]
enabled = false

[db.seed]
enabled = false

[realtime]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[local_smtp]
enabled = true
port = 54324
sender_name = "Golden Years Local"
admin_email = "local@goldenyears.invalid"

[storage]
enabled = false

[analytics]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/login"]
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.email.template.confirmation]
subject = "Golden Years local verification code"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Golden Years local password reset code"
content_path = "./supabase/templates/recovery.html"
